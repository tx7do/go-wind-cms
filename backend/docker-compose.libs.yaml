networks:
  app-tier:
    driver: bridge

services:
  postgres:
    image: docker.io/bitnami/postgresql:latest
    restart: always
    ports:
      - "5432:5432"
    networks:
      - app-tier
    environment:
      - POSTGRES_USER=postgres
      - POSTGRES_PASSWORD=*Abcd123456
      - POSTGRES_DB=gwc

#  mysql:
#    image: docker.io/bitnami/mariadb:latest
#    restart: always
#    ports:
#      - "3306:3306"
#    networks:
#      - app-tier
#    environment:
#      - MARIADB_ROOT_PASSWORD=*Abcd123456
#      - MARIADB_USER=admin
#      - MARIADB_PASSWORD=*Abcd123456
#      - MARIADB_DATABASE=gwc
#      - ALLOW_EMPTY_PASSWORD=yes
#      - TZ=Asia/Shanghai

  redis:
    image: docker.io/bitnami/redis:latest
    restart: always
    ports:
      - "6379:6379"
    networks:
      - app-tier
    environment:
      - ALLOW_EMPTY_PASSWORD=no
      - REDIS_PASSWORD=*Abcd123456
      - REDIS_AOF_ENABLED=no
      - REDIS_IO_THREADS_DO_READS=yes
      - REDIS_DISABLE_COMMANDS=FLUSHDB,FLUSHALL,CONFIG
#    volumes:
#      - ${APP_ROOT:-/root/app}/redis/data:/bitnami/redis/data

  elasticsearch:
    image: docker.io/bitnami/elasticsearch:latest
    restart: always
    ports:
      - "9200:9200"
      - "9300:9300"
    networks:
      - app-tier
    environment:
      - ELASTICSEARCH_USERNAME=elastic
      - ELASTICSEARCH_PASSWORD=*Abcd123456
      - ELASTICSEARCH_ENABLE_SECURITY=true
      - ELASTICSEARCH_CLUSTER_NAME=gwc-cluster
      - ELASTICSEARCH_NODE_NAME=gwc-node-1
      - ELASTICSEARCH_CLUSTER_INITIAL_MASTER_NODES=gwc-node-1
      - ELASTICSEARCH_DISCOVERY_TYPE=single-node
      - ELASTICSEARCH_NETWORK_HOST=0.0.0.0
      - ELASTICSEARCH_HEAP_SIZE=1g  # 根据服务器配置调整，建议不超过物理内存的50%
      - ELASTICSEARCH_ACTION_DESTRUCTIVE_REQUIRES_NAME=true # 禁止执行没有指定索引名称的删除操作，增加安全性
    ulimits:
      memlock:
        soft: -1
        hard: -1
      nofile:
        soft: 65535
        hard: 65535

  minio:
    image: docker.io/minio/minio:latest
    restart: always
    ports:
      - "9000:9000"
      - "9001:9001"
    networks:
      - app-tier
    environment:
      - MINIO_ROOT_USER=root
      - MINIO_ROOT_PASSWORD=*Abcd123456
      - MINIO_DEFAULT_BUCKETS=images
      - MINIO_FORCE_NEW_KEYS=yes
      - BITNAMI_DEBUG=true
#    volumes:
#      - ${APP_ROOT:-/root/app}/minio/data:/data
    command: server /data --console-address ':9001'

#  consul:
#    image: docker.io/bitnami/consul:latest
#    restart: always
#    ports:
#      - '8300:8300'
#      - '8301:8301'
#      - '8301:8301/udp'
#      - '8500:8500'
#      - '8600:8600'
#      - '8600:8600/udp'
#    networks:
#      - app-tier
#    environment:
#      - CONSUL_BIND_INTERFACE='eth0'
#      - CONSUL_AGENT_MODE=server
#      - CONSUL_ENABLE_UI=true
#      - CONSUL_BOOTSTRAP_EXPECT=1
#      - CONSUL_CLIENT_LAN_ADDRESS=0.0.0.0
#      - CONSUL_BIND_ADDR=0.0.0.0
#      - CONSUL_DISABLE_KEYRING_FILE=true
#      - CONSUL_NODE_NAME=consul

  etcd:
    image: quay.io/coreos/etcd:v3.6.8
    restart: always
    ports:
      - "2379:2379"
      - "2380:2380"
    networks:
      - app-tier
    environment:
      - ETCDCTL_API=3
      - ETCD_LISTEN_CLIENT_URLS=http://0.0.0.0:2379
      - ETCD_ADVERTISE_CLIENT_URLS=http://127.0.0.1:2379
      - ETCD_LISTEN_PEER_URLS=http://0.0.0.0:2380
      - ETCD_INITIAL_ADVERTISE_PEER_URLS=http://127.0.0.1:2380
      - ETCD_INITIAL_CLUSTER=default=http://127.0.0.1:2380
      - ETCD_INITIAL_CLUSTER_TOKEN=etcd-cluster-token
      - ETCD_INITIAL_CLUSTER_STATE=new
      - ETCD_NAME=default

  jaeger:
    image: docker.io/jaegertracing/all-in-one:latest
    restart: always
    ports:
      - "6831:6831/udp"
      - "5778:5778"
      - "4317:4317"
      - "4318:4318"
      - "16686:16686"
      - "14250:14250"
      - "14268:14268"
      - "14269:14269"
    networks:
      - app-tier
    environment:
      - COLLECTOR_ZIPKIN_HOST_PORT=:9411
      - COLLECTOR_OTLP_ENABLED=true
