<!DOCTYPE html>
<html>
<head>
  <meta content="text/html; charset=utf-8" http-equiv="Content-Type">
  <meta content="width=device-width,initial-scale=1,user-scalable=no" name="viewport">
  <meta name="mobile-web-app-capable" content="yes">
  <meta name="apple-touch-fullscreen" content="yes">
  <meta name="format-detection" content="telephone=no,address=no">
  <meta name="apple-mobile-web-app-status-bar-style" content="white">
  <meta http-equiv="X-UA-Compatible" content="IE=edge,chrome=1" >
  <title>GoWind CMS</title>
  <script async src="https://cdn.jsdelivr.net/npm/iconify-icon@latest/dist/iconify-icon.min.js"></script>
  <script>
    // 主题初始化（内联，首帧即执行，防闪烁）
    (function(){
      var ns='app',key=ns+'-theme-mode',mode=null;
      try{var s=localStorage.getItem(key);if(s){try{var p=JSON.parse(s);mode=p.value||p}catch(e){mode=s}}}
      catch(e){}
      var dark=false;
      if(mode==='dark')dark=true;
      else if(mode==='light')dark=false;
      else dark=window.matchMedia('(prefers-color-scheme:dark)').matches;
      document.documentElement.classList.add(dark?'dark':'light');
      document.documentElement.classList.add('app-loading');

      // 启动兜底：即使应用初始化异常，也在首屏后移除 loading 遮罩
      var clearLoading=function(){
        document.documentElement.classList.remove('app-loading');
      };
      if(document.readyState==='complete'){
        setTimeout(clearLoading,0);
      }else{
        window.addEventListener('load',clearLoading,{once:true});
        setTimeout(clearLoading,8000);
      }
    })();
  </script>
  <style>
    /* 首屏加载动画 - React 挂载后 #app 内容会被替换，app-loading 会被移除 */
    .app-loading body {
      margin: 0;
    }
    .app-loading #app {
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      min-height: 100dvh;
      background-color: #ebedf0;
      transition: background-color 0.3s;
    }
    .dark.app-loading #app {
      background-color: #17171a;
    }
    .app-loader {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 24px;
    }
    .app-loader-spinner {
      width: 40px;
      height: 40px;
      border: 3px solid #e8eaed;
      border-top-color: #1677ff;
      border-radius: 50%;
      animation: app-spin 0.8s linear infinite;
    }
    .dark .app-loader-spinner {
      border-color: #3a3a3c;
      border-top-color: #1677ff;
    }
    .app-loader-text {
      font-size: 14px;
      color: #86909c;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
    }
    .dark .app-loader-text {
      color: rgba(255,255,255,0.54);
    }
    @keyframes app-spin {
      to { transform: rotate(360deg); }
    }
  </style>
  <script><%= htmlWebpackPlugin.options.script %></script>
</head>
<body>
  <div id="app">
    <div class="app-loader">
      <div class="app-loader-spinner"></div>
      <div class="app-loader-text">Loading...</div>
    </div>
  </div>
</body>
</html>
